<!-- Modal for Multi-Part Maintenance -->
<div class="modal fade" id="multiPartModal" tabindex="-1" aria-labelledby="multiPartModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="multiPartModalLabel">Record Maintenance for Multiple Parts</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
  <form id="multiPartForm" method="post" action="{{ url_for('maintenance_multi') }}">
        <div class="modal-body">
          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="multi_site_id" class="form-label">Site <span class="text-danger">*</span></label>
              <select class="form-select" id="multi_site_id" name="site_id" required>
                <option value="">Select Site</option>
                {% for site in sites %}
                <option value="{{ site.id }}">{{ site.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-4 mb-3">
              <label for="multi_machine_id" class="form-label">Machine <span class="text-danger">*</span></label>
              <select class="form-select" id="multi_machine_id" name="machine_id" required disabled>
                <option value="">Select Machine</option>
                {% for machine in machines %}
                <option value="{{ machine.id }}" data-site="{{ machine.site_id }}">{{ machine.name }}{% if machine.machine_number %} ({{ machine.machine_number }}){% elif machine.serial_number %} (SN: {{ machine.serial_number }}){% endif %}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-4 mb-3">
              <label for="multi_part_ids" class="form-label">Parts <span class="text-danger">*</span></label>
              <select class="form-select" id="multi_part_ids" name="part_ids" multiple required disabled style="user-select: none;">
                {% for part in parts %}
                <option value="{{ part.id }}" data-machine="{{ part.machine_id }}">{{ part.name }}</option>
                {% endfor %}
              </select>
              <div class="form-text">Click to select or deselect multiple parts. No need to hold Ctrl or Cmd.</div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="multi_date" class="form-label">Date <span class="text-danger">*</span></label>
              <input type="date" class="form-control" id="multi_date" name="date" value="{{ now|to_eastern('%Y-%m-%d') }}" required>
            </div>
            <div class="col-md-4 mb-3">
              <label for="multi_maintenance_type" class="form-label">Maintenance Type <span class="text-danger">*</span></label>
              <select class="form-select" id="multi_maintenance_type" name="maintenance_type" required>
                <option value="">Select Type</option>
                <option value="Routine">Routine</option>
                <option value="Repair">Repair</option>
                <option value="Inspection">Inspection</option>
                <option value="Upgrade">Upgrade</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="multi_po_number" class="form-label">PO Number <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="multi_po_number" name="po_number" maxlength="32" required>
              <div class="form-text">Max 32 characters.</div>
            </div>
            <div class="col-md-6 mb-3">
              <label for="multi_work_order_number" class="form-label">Work Order Number <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="multi_work_order_number" name="work_order_number" maxlength="128" required>
              <div class="form-text">Max 128 characters.</div>
            </div>
          </div>
          <div class="mb-3">
            <label for="multi_description" class="form-label">Description <span class="text-danger">*</span></label>
            <textarea class="form-control" id="multi_description" name="description" rows="2" required></textarea>
          </div>
          <div class="mb-3">
            <label for="multi_notes" class="form-label">Notes</label>
            <textarea class="form-control" id="multi_notes" name="notes" rows="2"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-success">Record Maintenance for Selected Parts</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var multiSiteSelect = document.getElementById('multi_site_id');
    var multiMachineSelect = document.getElementById('multi_machine_id');
    var multiPartSelect = document.getElementById('multi_part_ids');

    if (!multiSiteSelect || !multiMachineSelect || !multiPartSelect) return;

    // Cache original options for filtering
    const multiMachineOptions = Array.from(multiMachineSelect.options).map(opt => ({
        value: opt.value,
        text: opt.text,
        siteId: opt.getAttribute('data-site')
    }));
    const multiPartOptions = Array.from(multiPartSelect.options).map(opt => ({
        value: opt.value,
        text: opt.text,
        machineId: opt.getAttribute('data-machine')
    }));

    function updateMultiMachineDropdown(siteId) {
        multiMachineSelect.innerHTML = '<option value="">Select Machine</option>';
        if (siteId) {
            multiMachineSelect.disabled = false;
            let machineCount = 0;
            for (const option of multiMachineOptions) {
                if (option.value && option.siteId === siteId) {
                    const newOption = document.createElement('option');
                    newOption.value = option.value;
                    newOption.text = option.text;
                    newOption.setAttribute('data-site', option.siteId);
                    multiMachineSelect.add(newOption);
                    machineCount++;
                }
            }
        } else {
            multiMachineSelect.disabled = true;
        }
        updateMultiPartDropdown(''); // Reset part dropdown
    }

    function updateMultiPartDropdown(machineId) {
        multiPartSelect.innerHTML = '';
        if (machineId) {
            multiPartSelect.disabled = false;
            let partCount = 0;
            for (const option of multiPartOptions) {
                if (option.value && option.machineId === machineId) {
                    const newOption = document.createElement('option');
                    newOption.value = option.value;
                    newOption.text = option.text;
                    newOption.setAttribute('data-machine', option.machineId);
                    multiPartSelect.add(newOption);
                    partCount++;
                }
            }
        } else {
            multiPartSelect.disabled = true;
        }
    }

    // Site selection handler
    multiSiteSelect.addEventListener('change', function() {
        updateMultiMachineDropdown(this.value);
    });

    // Machine selection handler
    multiMachineSelect.addEventListener('change', function() {
        updateMultiPartDropdown(this.value);
    });

    // Click-to-toggle for multi-select (no Ctrl/Cmd needed)
    multiPartSelect.addEventListener('mousedown', function(e) {
        if (e.target.tagName === 'OPTION') {
            e.preventDefault();
            // Store the current scroll position before making changes
            const scrollTop = multiPartSelect.scrollTop;
            e.target.selected = !e.target.selected;
            // Restore the scroll position after selection change
            setTimeout(() => {
                multiPartSelect.scrollTop = scrollTop;
            }, 0);
            multiPartSelect.focus();
            return false;
        }
    });

    // On modal open, if site/machine are pre-selected, enable and filter dropdowns
    const multiPartModal = document.getElementById('multiPartModal');
    if (multiPartModal) {
        multiPartModal.addEventListener('shown.bs.modal', function() {
            if (multiSiteSelect.value) {
                updateMultiMachineDropdown(multiSiteSelect.value);
                if (multiMachineSelect.value) {
                    updateMultiPartDropdown(multiMachineSelect.value);
                }
            }
        });
    }

    // Initialize disabled state
    multiMachineSelect.disabled = true;
    multiPartSelect.disabled = true;

    // Add form submission debugging for multi-part form
    const multiPartForm = document.getElementById('multiPartForm');
    if (multiPartForm) {
        multiPartForm.addEventListener('submit', function(e) {
            console.log('Multi-part form submission attempted');
            console.log('Multi Site ID:', multiSiteSelect.value);
            console.log('Multi Machine ID:', multiMachineSelect.value);
            
            const selectedParts = Array.from(multiPartSelect.selectedOptions).map(opt => opt.value);
            console.log('Selected Parts:', selectedParts);
            
            // Check if required fields are filled
            if (!multiSiteSelect.value || !multiMachineSelect.value || selectedParts.length === 0) {
                console.log('Multi-part form validation failed - missing required fields');
                alert('Please select Site, Machine, and at least one Part before submitting.');
                e.preventDefault();
                return false;
            }
            
            console.log('Multi-part form validation passed - submitting...');
        });
    }
});
</script>
